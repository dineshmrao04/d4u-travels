<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | D4U Travels</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0b1220;color:white}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px)
}

.logo{font-size:22px;font-weight:700;color:#00d4ff}
header a{color:white;text-decoration:none}

.section{padding:60px 20px}
.section h2{text-align:center;margin-bottom:20px;font-size:32px}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
max-width:1000px;
margin:auto
}

.card{
background:#111a2e;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5)
}

.input-group{margin-bottom:15px}
.input-group label{display:block;margin-bottom:5px;color:#aaa}
.input-group input,.input-group textarea{
width:100%;
padding:10px;
border:none;
border-radius:8px
}

textarea{resize:none;height:120px}

.btn{
padding:12px;
border:none;
border-radius:8px;
background:#00d4ff;
color:black;
cursor:pointer;
font-weight:600;
transition:.3s
}
.btn:hover{transform:scale(1.05)}

.success{
color:#00ffae;
margin-top:10px;
display:none;
text-align:center
}

.info p{margin:10px 0;color:#ccc}

.map{margin-top:20px;border-radius:15px;overflow:hidden}
iframe{width:100%;height:200px;border:none}

footer{
padding:30px;
text-align:center;
background:#050814
}
</style>
</head>

<body>

<header>
<div class="logo">🌍 D4U TRAVELS</div>
<a href="index.html">← Home</a>
</header>

<section class="section">
<h2>📞 Contact Us</h2>

<div class="container">

<!-- CONTACT FORM -->
<div class="card">
<h3>Send Message</h3>

<div class="input-group">
<label>Name</label>
<input id="name" placeholder="Your Name">
</div>

<div class="input-group">
<label>Email</label>
<input id="email" type="email" placeholder="Your Email">
</div>

<div class="input-group">
<label>Message</label>
<textarea id="message" placeholder="Your Message"></textarea>
</div>

<div style="text-align:center; margin-top:20px;">
<button class="btn" onclick="sendMessage()">📧 Send Message</button>

<p class="success" id="successMsg">
✅ Message sent successfully!
</p>
</div>

</div>

<!-- CONTACT INFO -->
<div class="card info">
<h3>Contact Information</h3>
<p>📧 Email: dineshmrao04@gmail.com</p>
<p>📍 Location: Jodhpur, India</p>

<div class="map">
<iframe src="https://maps.google.com/maps?q=Jodhpur&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

</div>

</div>
</section>

<footer>
<h3>📧 Contact Us</h3>
<p>Email: dineshmrao04@gmail.com</p>
<p>© 2026 D4U Travels | All Rights Reserved</p>
</footer>

<script>
function sendMessage(){
let name=document.getElementById('name').value;
let email=document.getElementById('email').value;
let message=document.getElementById('message').value;

if(!name||!email||!message){
alert('Please fill all fields');
return;
}

// Open email with user data
window.location.href = `mailto:dineshmrao04@gmail.com?subject=Travel Inquiry from ${name}&body=Name: ${name}%0AEmail: ${email}%0AMessage: ${message}`;

// Show success message
document.getElementById('successMsg').style.display='block';

// Clear fields
document.querySelectorAll('input,textarea').forEach(i=>i.value='');
}
</script>

</body>
</html>
