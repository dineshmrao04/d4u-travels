<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D4U Travels | Explore the World</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0b1220,#050814);
color:white;
overflow-x:hidden;
}

/* ================= HEADER (IMPROVED) ================= */
header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 6vw;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:1000;
}

header.scrolled{
background:#000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:white;
}

.logo img{
height:40px;
}

nav{
display:flex;
gap:25px;
}

nav a{
text-decoration:none;
color:white;
font-size:15px;
transition:0.3s;
}

nav a:hover{
color:#00d4ff;
}

/* MOBILE MENU */
.menu-btn{
display:none;
font-size:28px;
cursor:pointer;
}

/* ================= HERO (BALANCED HEIGHT) ================= */
.hero{
width:100%;
min-height:75vh; /* reduced height for better balance */
display:flex;
align-items:center;
justify-content:center;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
padding:100px 6vw 40px;
}

.hero-box{
width:100%;
max-width:1200px;
text-align:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
padding:40px 30px;
border-radius:25px;
}

.hero h1{
font-size:clamp(30px,4vw,60px);
}

.hero p{
margin:10px 0 20px;
color:#ddd;
}

/* BUTTON */
.btn{
display:inline-block;
padding:12px 28px;
border-radius:12px;
background:#00d4ff;
color:black;
font-weight:600;
text-decoration:none;
transition:0.3s;
box-shadow:0 0 18px #00d4ff;
}

.btn:hover{
background:#00ffa6;
transform:scale(1.05);
}

/* ================= SECTIONS (LESS HEIGHT, MORE WIDTH FEEL) ================= */
.section{
width:100%;
padding:60px 6vw; /* reduced height */
text-align:center;
}

.section h2{
font-size:clamp(22px,3vw,34px);
margin-bottom:25px;
}

/* GRID WIDE LOOK */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
gap:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(15px);
border-radius:18px;
padding:14px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

/* FEATURES */
.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

/* ================= EMAIL BUTTON (IMPROVED FAB STYLE) ================= */
.email-btn{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:#00d4ff;
color:black;
border-radius:50%;
font-size:22px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.email-btn:hover{
background:#00ffa6;
transform:scale(1.1);
}

/* FOOTER */
footer{
padding:25px;
text-align:center;
background:#050814;
}

/* ================= MOBILE ================= */
@media(max-width:768px){

nav{
display:none;
position:absolute;
top:65px;
right:6vw;
flex-direction:column;
background:black;
padding:15px;
border-radius:10px;
}

nav.active{
display:flex;
}

.menu-btn{
display:block;
}
}

/* SCROLL FIX */
html{
scroll-behavior:smooth;
}
</style>
</head>

<body>

<header>
<a class="logo">
<img src="./D4U.png">
<span>D4U TRAVELS</span>
</a>

<div class="menu-btn" onclick="document.getElementById('nav').classList.toggle('active')">☰</div>

<nav id="nav">
<a href="index.html">Home</a>
<a href="packages.html">Packages</a>
<a href="booking.html">Booking</a>
<a href="about.html">About</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-box">
<h1>Explore The World ✈️</h1>
<p>Best Deals | Trusted Service | Easy Booking</p>
<a href="booking.html" class="btn">Start Booking</a>
</div>
</section>

<!-- DESTINATIONS -->
<section class="section">
<h2>🌍 Popular Destinations</h2>
<div class="grid">
<div class="card"><img src="https://images.unsplash.com/photo-1512343879784-a960bf40e7f2"><h3>Goa</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"><h3>Manali</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c"><h3>Dubai</h3></div>
</div>
</section>

<!-- PACKAGES -->
<section class="section">
<h2>💎 Premium Packages</h2>
<div class="grid">
<div class="card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"><h3>Maldives</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b"><h3>Europe</h3></div>
</div>
</section>

<!-- FEATURES -->
<section class="section">
<h2>⭐ Why Choose Us</h2>
<div class="features">
<div>💰 Best Price</div>
<div>⚡ Fast Booking</div>
<div>🌍 Global Tours</div>
</div>
</section>

<footer>
<p>© 2026 D4U Travels</p>
</footer>

<!-- EMAIL BUTTON -->
<a class="email-btn" href="mailto:dineshmrao04@gmail.com">📧</a>

</body>
</html>
